name: Build and Push

on:
  push:
    branches: [main]
    paths-ignore:
      - "README.md"
      - "CLAUDE.md"
      - "LICENSE"

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/za-portfolio:latest
            ghcr.io/${{ github.repository_owner }}/za-portfolio:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
